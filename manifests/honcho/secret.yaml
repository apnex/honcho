# Real value applied out-of-band via:
#   kubectl -n honcho create secret generic honcho-llm-keys \
#     --from-literal=LLM_OPENAI_API_KEY=sk-...
#
# This placeholder manifest exists so kustomize is aware of the secret and
# Argo doesn't try to delete it. The real Secret object is owned by the
# operator, not Argo. The `kubernetes.io/managed-by` annotation tells Argo
# to ignore drift on this object.
apiVersion: v1
kind: Secret
metadata:
  name: honcho-llm-keys
  annotations:
    argocd.argoproj.io/sync-options: Replace=false
    argocd.argoproj.io/compare-options: IgnoreExtraneous
type: Opaque
stringData:
  LLM_OPENAI_API_KEY: REPLACE_OUT_OF_BAND

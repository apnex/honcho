apiVersion: apps/v1
kind: Deployment
metadata:
  name: honcho
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: honcho
  template:
    metadata:
      labels:
        app: honcho
    spec:
      containers:
        - name: honcho
          image: localhost/honcho:v3.0.7
          imagePullPolicy: Never
          command: ["sh", "docker/entrypoint.sh"]
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: honcho-config
            - secretRef:
                name: honcho-llm-keys
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests: { cpu: 200m, memory: 512Mi }
            limits:   { cpu: "2",  memory: 2Gi }

apiVersion: apps/v1
kind: Deployment
metadata:
  name: honcho-deriver
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: honcho-deriver
  template:
    metadata:
      labels:
        app: honcho-deriver
    spec:
      # Wait for postgres + redis to be reachable before starting the deriver.
      # validate_embedding_schema() at startup requires pg + pgvector to be
      # live; without this gate the deriver crash-loops on cold-boot.
      initContainers:
        - name: wait-for-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              set -e
              echo "[init] waiting for postgres:5432..."
              until nc -z postgres 5432; do sleep 1; done
              echo "[init] postgres ready"
              echo "[init] waiting for redis:6379..."
              until nc -z redis 6379; do sleep 1; done
              echo "[init] redis ready"
              echo "[init] all dependencies up — handing off to deriver"
      containers:
        - name: deriver
          image: localhost/honcho:v3.0.7
          imagePullPolicy: Never
          # Run the queue worker rather than the API server.
          # `python -m src.deriver` calls validate_embedding_schema (fail-fast
          # if pgvector column dimension != EMBEDDING_VECTOR_DIMENSIONS),
          # then drains the queue table via queue_manager.main().
          command: ["/app/.venv/bin/python", "-m", "src.deriver"]
          envFrom:
            - configMapRef:
                name: honcho-config
            - secretRef:
                name: honcho-llm-keys
          # No HTTP server → no readiness/liveness probes. If the process dies,
          # the Deployment restarts it. Prometheus metrics on 9090 are scraped
          # in-cluster only and not exposed via a Service yet.
          resources:
            requests: { cpu: 200m, memory: 512Mi }
            limits:   { cpu: "2",  memory: 2Gi }

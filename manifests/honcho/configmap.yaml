apiVersion: v1
kind: ConfigMap
metadata:
  name: honcho-config
data:
  # --- Database / cache wiring (resolved via in-cluster DNS) ---
  DB_CONNECTION_URI: "postgresql+psycopg://honcho:honcho-internal-dev@postgres.honcho.svc.cluster.local:5432/honcho"
  CACHE_URL: "redis://redis.honcho.svc.cluster.local:6379/0"
  CACHE_ENABLED: "true"

  # --- Auth disabled for internal trusted use ---
  AUTH_USE_AUTH: "false"

  # --- LLM (LiteLLM proxy is OpenAI-compatible) ---
  LLM_DEFAULT_MAX_TOKENS: "4096"

  # Route every Honcho LLM call through the same proxy Hermes uses.
  # Models on proxy: smart-fast, smart-reasoning, smart-coder, smart-embedding.
  DERIVER_MODEL_CONFIG__TRANSPORT: "openai"
  DERIVER_MODEL_CONFIG__MODEL: "smart-fast"
  DERIVER_MODEL_CONFIG__OVERRIDES__BASE_URL: "https://litellm-proxy-5muxctm3ta-km.a.run.app/v1"

  SUMMARY_MODEL_CONFIG__TRANSPORT: "openai"
  SUMMARY_MODEL_CONFIG__MODEL: "smart-fast"
  SUMMARY_MODEL_CONFIG__OVERRIDES__BASE_URL: "https://litellm-proxy-5muxctm3ta-km.a.run.app/v1"

  # Dialectic levels: minimal/low → fast, medium/high → fast, max → reasoning
  DIALECTIC_LEVELS__minimal__MODEL_CONFIG__TRANSPORT: "openai"
  DIALECTIC_LEVELS__minimal__MODEL_CONFIG__MODEL: "smart-fast"
  DIALECTIC_LEVELS__minimal__MODEL_CONFIG__OVERRIDES__BASE_URL: "https://litellm-proxy-5muxctm3ta-km.a.run.app/v1"
  DIALECTIC_LEVELS__low__MODEL_CONFIG__TRANSPORT: "openai"
  DIALECTIC_LEVELS__low__MODEL_CONFIG__MODEL: "smart-fast"
  DIALECTIC_LEVELS__low__MODEL_CONFIG__OVERRIDES__BASE_URL: "https://litellm-proxy-5muxctm3ta-km.a.run.app/v1"
  DIALECTIC_LEVELS__medium__MODEL_CONFIG__TRANSPORT: "openai"
  DIALECTIC_LEVELS__medium__MODEL_CONFIG__MODEL: "smart-fast"
  DIALECTIC_LEVELS__medium__MODEL_CONFIG__OVERRIDES__BASE_URL: "https://litellm-proxy-5muxctm3ta-km.a.run.app/v1"
  DIALECTIC_LEVELS__high__MODEL_CONFIG__TRANSPORT: "openai"
  DIALECTIC_LEVELS__high__MODEL_CONFIG__MODEL: "smart-reasoning"
  DIALECTIC_LEVELS__high__MODEL_CONFIG__OVERRIDES__BASE_URL: "https://litellm-proxy-5muxctm3ta-km.a.run.app/v1"
  DIALECTIC_LEVELS__max__MODEL_CONFIG__TRANSPORT: "openai"
  DIALECTIC_LEVELS__max__MODEL_CONFIG__MODEL: "smart-reasoning"
  DIALECTIC_LEVELS__max__MODEL_CONFIG__OVERRIDES__BASE_URL: "https://litellm-proxy-5muxctm3ta-km.a.run.app/v1"

  # --- Dreamer (deductive + inductive consolidation) ---
  # Enabled 2026-05-25 (DEFERRED-04 in kate/docs/memory/04-implementation-plan.md).
  # Specialist model configs default to gpt-5.4-mini via OpenAI public API in
  # v3.0.7 - they MUST be re-pointed at our LiteLLM proxy or dream cycles fail
  # silently (no LLM endpoint = no observations written). Same wiring pattern
  # as DERIVER_MODEL_CONFIG / DIALECTIC_LEVELS / EMBEDDING_MODEL_CONFIG above.
  #
  # Cost containment: DREAM.MIN_HOURS_BETWEEN_DREAMS=8 (upstream default) caps
  # cycles to <=3/day per collection. ENABLED_TYPES=["omni"] runs both
  # deduction + induction in one cycle (orchestrator.py:193,221).
  DREAM_ENABLED: "true"

  # Deduction: high-confidence rollups; may write peer-card (can_update_peer_card=True).
  # Quality matters more than cost here - use smart-reasoning.
  DREAM_DEDUCTION_MODEL_CONFIG__TRANSPORT: "openai"
  DREAM_DEDUCTION_MODEL_CONFIG__MODEL: "smart-reasoning"
  DREAM_DEDUCTION_MODEL_CONFIG__OVERRIDES__BASE_URL: "https://litellm-proxy-5muxctm3ta-km.a.run.app/v1"

  # Induction: pattern generalizations; cannot write peer-card (can_update_peer_card=False).
  # Larger observation sets; smart-coder is a proven tool-calling substitute.
  DREAM_INDUCTION_MODEL_CONFIG__TRANSPORT: "openai"
  DREAM_INDUCTION_MODEL_CONFIG__MODEL: "smart-coder"
  DREAM_INDUCTION_MODEL_CONFIG__OVERRIDES__BASE_URL: "https://litellm-proxy-5muxctm3ta-km.a.run.app/v1"

  # Process every queued work unit immediately instead of waiting for the
  # representation batch to hit REPRESENTATION_BATCH_MAX_TOKENS. Right setting
  # for low-volume / personal instances where latency > throughput. Flip to
  # false once we have enough traffic that batching is worthwhile.
  DERIVER_FLUSH_ENABLED: "true"

  # --- Embeddings: vertex_ai/gemini-embedding-001 via LiteLLM proxy ---
  # transport=openai because the proxy speaks OpenAI; LiteLLM translates to Vertex.
  # dimensions_mode=always forces sending `dimensions=` so we get 3072-d vectors
  # (gemini-embedding-001 default is 3072 but supports MRL truncation).
  # API key falls back to LLM_OPENAI_API_KEY (already in honcho-llm-keys secret).
  EMBEDDING_MODEL_CONFIG__TRANSPORT: "openai"
  EMBEDDING_MODEL_CONFIG__MODEL: "smart-embedding"
  EMBEDDING_MODEL_CONFIG__OVERRIDES__BASE_URL: "https://litellm-proxy-5muxctm3ta-km.a.run.app/v1"
  EMBEDDING_MODEL_CONFIG__DIMENSIONS_MODE: "always"
  EMBEDDING_VECTOR_DIMENSIONS: "3072"

